<!doctype html>
<html lang="be">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ЦЭ</title>
    <link rel="stylesheet" href="css/null.css" />
    <link rel="stylesheet" href="css/fonts.css" />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <main>
      <section class="ce-page">
        <div class="container">
          <div class="ce-header">
            <button class="back_btn" onclick="window.location.href='section.html'">
              <img src="./img/Arrow_back.svg" alt="Назад" class="back-arrow" />
            </button>
            <div class="block_title">
              <h1 class="ce-title">Цэнтралізаваны экзамен</h1>
            </div>
            <button class="add-ce-btn" id="addMaterialBtn" style="display: flex">
              <img src="./img/plus.svg" alt="Дадаць" class="plus-icon" />
            </button>
          </div>

          <div class="ce-description">
            <p>Дапаможныя матэрыялы для падрыхтоўкі да Цэнтралізаванага экзамену па беларускай мове</p>
          </div>

          <div class="materials-container" id="materialsContainer"></div>
        </div>
      </section>
    </main>

    <div id="imageViewModal" class="modal" style="display: none">
      <div class="modal-content image-view-content">
        <img src="" alt="Прагляд" id="viewImage" />
        <button class="close-image-modal">Закрыць</button>
      </div>
    </div>

    <script src="js/api.js"></script>
    <script>
      if (!API.isAuthenticated()) {
        window.location.href = 'authorization.html';
      }

      const isTeacher = API.isTeacher();
      document.getElementById("addMaterialBtn").style.display = "flex";

      // Кнопка "+" в хедере
      document.getElementById("addMaterialBtn").addEventListener("click", () => {
        window.location.href = "forma_ca.html";
      });

      // Загрузка материалов из БД
      async function loadMaterials() {
        const container = document.getElementById("materialsContainer");
        container.innerHTML = '<p class="empty-message">Загрузка...</p>';

        try {
          const result = await API.getCEMaterials();
          
          if (result.success && result.data.materials) {
            const materials = result.data.materials;
            container.innerHTML = "";

            if (materials.length === 0) {
              container.innerHTML = '<p class="empty-message">Няма матэрыялаў.</p>';
              return;
            }

            materials.forEach((item) => {
              let el = document.createElement("div");
              el.className = "ce-item";
              el.dataset.id = item.id;

              if (item.material_type === 'test') {
                el.innerHTML = `
                  <div class="item-info">
                    <div class="item-title">📝 ${item.title}</div>
                    <div class="item-meta">Тэст для падрыхтоўкі да ЦЭ</div>
                  </div>
                  <div class="item-actions">
                    <button class="item-btn start-test" data-test-id="${item.test_id}">▶ Пачаць</button>
                    ${isTeacher ? `
                      <button class="item-btn edit-item">✏️</button>
                      <button class="item-btn delete-item">🗑️</button>
                    ` : ''}
                  </div>
                `;
              } else if (item.material_type === 'link') {
                el.innerHTML = `
                  <div class="item-info">
                    <div class="item-title">🔗 ${item.title}</div>
                    <div class="item-meta">${item.content_url || ''}</div>
                  </div>
                  <div class="item-actions">
                    <a href="${item.content_url}" class="item-btn open-link" target="_blank">🔗 Адкрыць</a>
                    ${isTeacher ? `
                      <button class="item-btn edit-item">✏️</button>
                      <button class="item-btn delete-item">🗑️</button>
                    ` : ''}
                  </div>
                `;
              } else if (item.material_type === 'image') {
                el.className = "ce-item image-item";
                el.innerHTML = `
                  <div class="item-image">
                    <img src="${item.image_data}" alt="${item.title}">
                  </div>
                  <div class="item-info">
                    <div class="item-title">🖼️ ${item.title}</div>
                  </div>
                  <div class="item-actions">
                    <button class="item-btn view-image">👁️ Паглядзець</button>
                    ${isTeacher ? `
                      <button class="item-btn edit-item">✏️</button>
                      <button class="item-btn delete-item">🗑️</button>
                    ` : ''}
                  </div>
                `;
              }
              container.appendChild(el);
            });

            attachHandlers();
          } else {
            container.innerHTML = '<p class="empty-message">Памылка загрузкі</p>';
          }
        } catch (error) {
          console.error("Памылка:", error);
          container.innerHTML = '<p class="empty-message">Памылка злучэння</p>';
        }
      }

      function attachHandlers() {
        // Просмотр изображений
        document.querySelectorAll(".view-image").forEach(btn => {
          btn.addEventListener("click", () => {
            const img = btn.closest(".image-item")?.querySelector(".item-image img");
            if (img) {
              document.getElementById("viewImage").src = img.src;
              document.getElementById("imageViewModal").style.display = "flex";
            }
          });
        });

        document.querySelector(".close-image-modal")?.addEventListener("click", () => {
          document.getElementById("imageViewModal").style.display = "none";
        });

        document.getElementById("imageViewModal").addEventListener("click", (e) => {
          if (e.target === e.currentTarget) e.currentTarget.style.display = "none";
        });

        // Запуск теста
        document.querySelectorAll(".start-test").forEach(btn => {
          btn.addEventListener("click", function () {
            const testId = this.dataset.testId;
            if (testId) window.location.href = `test_student.html?id=${testId}`;
          });
        });

        // Редактирование
        document.querySelectorAll(".edit-item").forEach(btn => {
          btn.addEventListener("click", function () {
            const item = this.closest(".ce-item");
            const id = item.dataset.id;
            window.location.href = `forma_ca.html?edit=${id}`;
          });
        });

        // Удаление
        document.querySelectorAll(".delete-item").forEach(btn => {
          btn.addEventListener("click", async function () {
            if (!confirm("Выдаліць гэты матэрыял?")) return;
            const item = this.closest(".ce-item");
            const id = item.dataset.id;
            const result = await API.deleteCEMaterial(id);
            if (result.success) {
              loadMaterials();
            } else {
              alert("Памылка выдалення");
            }
          });
        });
      }

      loadMaterials();
    </script>
  </body>
</html>
