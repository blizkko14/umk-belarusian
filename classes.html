<!doctype html>
<html lang="be">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Класы</title>
    <link rel="stylesheet" href="css/null.css" />
    <link rel="stylesheet" href="css/fonts.css" />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <main>
      <section class="classes">
        <div class="container">
          <div class="classes_wrapper">
            <ul class="list_classes">
              <div class="part1">
                <li class="li_class">
                <button class="but_class">5 клас</button>
              </li>
              <li class="li_class">
                <button class="but_class">6 клас</button>
              </li>
              <li class="li_class">
                <button class="but_class">7 клас</button>
              </li>
              <li class="classes_back">
                <button class="back">
                  <img src="./img/Arrow_back.svg" alt="" class="arrow_back" />
                </button>
              </li>
              </div>
              <div class="part2">
              <li class="li_class">
                <button class="but_class">8 клас</button>
              </li>
              <li class="li_class">
                <button class="but_class">9 клас</button>
              </li>
              <li class="li_class">
                <button class="but_class">10 клас</button>
              </li>
              <li class="li_class">
                <button class="but_class">11 клас</button>
              </li>
              <li class="classes_back">
                <button class="back2">
                  <img src="./img/Arrow_back.svg" alt="" class="arrow_back" />
                </button>
              </li>
              </div>
            </ul>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
