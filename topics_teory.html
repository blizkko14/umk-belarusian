<!doctype html>
<html lang="be">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Канспекты</title>
    <link rel="stylesheet" href="css/null.css" />
    <link rel="stylesheet" href="css/fonts.css" />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <main>
      <section class="topics">
        <div class="container">
          <div class="topics_header">
            <button class="back_btn" id="backBtn">
              <img src="./img/Arrow_back.svg" alt="Назад" class="back-arrow" />
            </button>
            <div class="block_title">
              <h1 class="topics_title" id="classTitle">5 клас</h1>
            </div>
            <button class="add-topic-btn" id="addConspectBtn" style="display: flex">
              <img src="./img/plus.svg" alt="Дадаць" class="back-arrow" />
            </button>
          </div>

          <div class="topics_list" id="conspectsList">
            <!-- Канспекты будуць загружаны -->
          </div>
        </div>
      </section>
    </main>

    <!-- Модальное окно подтверждения удаления -->
    <div id="deleteModal" class="modal" style="display: none">
      <div class="modal-content">
        <h3>⚠️ Пацверджанне выдалення</h3>
        <p>Вы сапраўды хочаце выдаліць канспект <strong id="deleteItemName"></strong>?</p>
        <div class="modal-buttons">
          <button class="modal-btn confirm" id="confirmDeleteBtn">Выдаліць</button>
          <button class="modal-btn cancel" id="cancelDeleteBtn">Адмяніць</button>
        </div>
      </div>
    </div>

    <script src="js/api.js"></script>
    <script>
      
      if (!API.isAuthenticated()) {
          window.location.href = 'authorization.html';
      }

      const urlParams = new URLSearchParams(window.location.search);
      const classNumber = urlParams.get('class') || '5';
      const isTeacher = API.isTeacher();
      
      document.getElementById('classTitle').textContent = `${classNumber} клас`;
      
      if (!isTeacher) {
          document.getElementById('addConspectBtn').style.display = 'none';
      }

      document.getElementById('backBtn').addEventListener('click', () => {
          window.location.href = `classes.html?type=teory`;
      });

      document.getElementById('addConspectBtn').addEventListener('click', () => {
          window.location.href = `forma_teory.html?class=${classNumber}`;
      });

      // Загрузка канспектаў з БД
      async function loadConspects() {
          const container = document.getElementById('conspectsList');
          container.innerHTML = '<p class="empty-message">Загрузка...</p>';
          
          try {
              const result = await API.request(`conspects/get.php?class_id=${classNumber}`);
              
              if (result.success && result.data.conspects) {
                  const conspects = result.data.conspects;
                  
                  if (conspects.length === 0) {
                      container.innerHTML = '<p class="empty-message">Няма канспектаў. Дадайце новы канспект.</p>';
                      return;
                  }
                  
                  container.innerHTML = '';
                  
                  conspects.forEach(conspect => {
                      const wrapper = document.createElement('div');
                      wrapper.className = 'topic_block_wrapper';
                      wrapper.innerHTML = `
                          <button class="topic_block" data-id="${conspect.id}">
                              <div style="font-weight: bold;">${conspect.title}</div>
                              <div style="font-size: 12px; opacity: 0.7; margin-top: 5px;">
                                  ${conspect.teacher_name || 'Настаўнік'} • ${conspect.created_at ? new Date(conspect.created_at).toLocaleDateString('be-BY') : ''}
                              </div>
                          </button>
                          ${isTeacher ? `
                              <div class="topic_actions">
                                  <button class="topic_icon edit" data-id="${conspect.id}" title="Рэдагаваць">✏️</button>
                                  <button class="topic_icon delete" data-id="${conspect.id}" data-title="${conspect.title}" title="Выдаліць">🗑️</button>
                              </div>
                          ` : ''}
                      `;
                      container.appendChild(wrapper);
                  });
                  
                  // Апрацоўшчыкі
                  document.querySelectorAll('.topic_block').forEach(btn => {
                      btn.addEventListener('click', function() {
                          const id = this.dataset.id;
                          // Пераход на старонку прагляду канспекта
                          window.location.href = `teory.html?id=${id}&class=${classNumber}`;
                      });
                  });
                  
                  document.querySelectorAll('.edit').forEach(btn => {
                      btn.addEventListener('click', function(e) {
                          e.stopPropagation();
                          const id = this.dataset.id;
                          window.location.href = `forma_teory.html?class=${classNumber}&conspect_id=${id}`;
                      });
                  });
                  
                  // Выдаленне
                  const deleteModal = document.getElementById('deleteModal');
                  const deleteName = document.getElementById('deleteItemName');
                  let currentDeleteId = null;
                  
                  document.querySelectorAll('.delete').forEach(btn => {
                      btn.addEventListener('click', function(e) {
                          e.stopPropagation();
                          currentDeleteId = this.dataset.id;
                          deleteName.textContent = this.dataset.title;
                          deleteModal.style.display = 'flex';
                      });
                  });
                  
                  document.getElementById('confirmDeleteBtn').onclick = async () => {
                      if (currentDeleteId) {
                          const result = await API.deleteConspect(currentDeleteId);
                          if (result.success) {
                              deleteModal.style.display = 'none';
                              loadConspects();
                          } else {
                              alert('Памылка: ' + result.message);
                          }
                      }
                  };
                  
                  document.getElementById('cancelDeleteBtn').onclick = () => {
                      deleteModal.style.display = 'none';
                  };
              } else {
                  container.innerHTML = '<p class="empty-message">Памылка загрузкі канспектаў</p>';
              }
          } catch (error) {
              console.error('Памылка:', error);
              container.innerHTML = '<p class="empty-message">Памылка загрузкі</p>';
          }
      }

      // Закрыццё мадальнага акна
      window.addEventListener('click', (e) => {
          const modal = document.getElementById('deleteModal');
          if (e.target === modal) modal.style.display = 'none';
      });

      // Стыль
      const style = document.createElement('style');
      style.textContent = `
          .empty-message {
              text-align: center;
              font-family: "Montserrat Alternates", sans-serif;
              font-size: 18px;
              color: #5f2d1e;
              padding: 40px;
              opacity: 0.7;
          }
      `;
      document.head.appendChild(style);

      loadConspects();
    </script>
  </body>
</html>
