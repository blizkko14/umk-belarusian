<!doctype html>
<html lang="be">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ВМК</title>
    <link rel="stylesheet" href="css/null.css" />
    <link rel="stylesheet" href="css/fonts.css" />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <main>
      <section class="sections">
        <div class="container">
          <div class="parts_exit">
              <div class="exit-placeholder"></div> 
            <h1 class="title_section">Раздзелы</h1>
            <button class="exit">Выхад</button>
          </div>
          <div class="parts">
            <div class="card">
              <div class="img_teory"><img src="./img/книга.png" alt="" class="teory" /></div>
              <h2 class="title_cards">Тэорыя</h2>
              <button class="run">
                Перайсці <img src="./img/Arrow 2.png" alt=""  class="Arrow"/>
              </button>
            </div>
            <div class="card2" class="card">
              <div class="img_teory"><img src="./img/карандаш.png" alt="" class="pen" /></div>
              <h2 class="title_cards">Тэсты</h2>
              <button class="run2" class="run">
                Перайсці <img src="./img/Arrow 2.png" alt="" class="Arrow" />
              </button>
            </div>
            <div class="card">
              <div class="img_teory"><img src="./img/бланк.png" alt="" class="teory" /></div>
              <h2 class="title_cards">ЦЭ</h2>
              <button class="run">
                Перайсці <img src="./img/Arrow 2.png" alt="" class="Arrow" />
              </button>
            </div>
          </div>
        </div>
      </section>
    </main>
