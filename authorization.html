<!doctype html>
<html lang="be">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Уваход</title>
    <link rel="stylesheet" href="css/null.css" />
    <link rel="stylesheet" href="css/fonts.css" />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <main>
        <section class="forma_authorization">
            <div class="forma">
                <div class="title_forma">Пацвярджэнне асобы</div>
                <div class="inputs">
                    <input type="text" id="username" placeholder="Логiн" class="input_log_pas" value="teacher">
                    <input type="password" id="password" placeholder="Пароль" class="input_log_pas" value="teacher123">
                </div>
                <div id="errorMsg" style="color: red; text-align: center; font-family: Montserrat-Alternates ; margin-top: 10px;"></div>
                <div class="but">
                    <button id="loginBtn" class="log_in">Уваход</button>
                </div>
            </div>
        </section>
    </main>
    
    <script>
        // ПРОСТЫ І ПРАЦОЎНЫ КОД АЎТАРЫЗАЦЫІ
        document.getElementById('loginBtn').addEventListener('click', async function() {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('errorMsg');
            
            console.log('Спроба ўваходу:', username);
            
            if (!username || !password) {
                errorMsg.textContent = 'Калі ласка, увядзіце лагін і пароль';
                return;
            }
            
            errorMsg.textContent = 'Праверка...';
            
            try {
                const response = await fetch('http://localhost/UMK/api/auth/login.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: username, password: password })
                });
                
                const result = await response.json();
                console.log('Вынік:', result);
                
                if (result.success) {
                    // Захоўваем даныя карыстальніка
                    localStorage.setItem('currentUser', JSON.stringify(result.data.user));
                    errorMsg.textContent = '';
                    // Пераходзім на галоўную старонку
                    window.location.href = 'section.html';
                } else {
                    errorMsg.textContent = result.message || 'Няправільны лагін або пароль';
                }
            } catch (error) {
                console.error('Памылка:', error);
                errorMsg.textContent = 'Памылка злучэння з серверам';
            }
        });
        
        // Уваход па Enter
        document.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                document.getElementById('loginBtn').click();
            }
        });
        
        // Праверка, ці ўжо ўвайшоў
        const user = localStorage.getItem('currentUser');
        if (user) {
            console.log('Карыстальнік ужо ўвайшоў, перанакіроўваем...');
            window.location.href = 'section.html';
        }
    </script>
  </body>
</html>
