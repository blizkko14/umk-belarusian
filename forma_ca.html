<!DOCTYPE html>
<html lang="be">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Дадаць матэрыял да ЦЭ</title>
    <link rel="stylesheet" href="css/null.css">
    <link rel="stylesheet" href="css/fonts.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <main>
        <section class="add-ce-page">
            <div class="container">
                <div class="add-ce-header">
                    <button class="back_btn" id="backBtn">
                        <img src="./img/Arrow_back.svg" alt="Назад" class="back-arrow">
                    </button>
                    <div class="block_title">
                        <h1 class="add-ce-title" id="pageTitle">Дадаць матэрыял да ЦЭ</h1>
                    </div>
                    <div class="placeholder_btn"></div>
                </div>

                <div class="add-ce-form">
                    <div class="form_field">
                        <label class="form_label">📋 Тып матэрыяла</label>
                        <select id="ceMaterialType" class="form_select">
                            <option value="test">📝 Тэст</option>
                            <option value="link">🔗 Спасылка</option>
                            <option value="image">🖼️ Выява</option>
                        </select>
                    </div>

                    <div class="form_field">
                        <label class="form_label">Назва</label>
                        <input type="text" class="form_input" id="ceMaterialName" placeholder="Увядзіце назву матэрыяла">
                    </div>

                    <!-- БЛОК: ТЭСТ -->
                    <div id="testBlock" class="material-block">
                        <div class="form_field">
                            <label class="form_label">⏱️ Час (хвілін)</label>
                            <input type="number" class="form_input" value="20" id="testTime" min="1">
                        </div>

                        <div class="questions_section">
                            <div class="questions_header">
                                <label class="form_label">Пытанні</label>
                                <button type="button" class="add_question_btn" id="addQuestionBtn">+ Дадаць пытанне</button>
                            </div>
                            <div id="questionsContainer"></div>
                        </div>
                    </div>

                    <!-- БЛОК: СПАСЫЛКА -->
                    <div id="linkBlock" class="material-block" style="display: none;">
                        <div class="form_field">
                            <label class="form_label">URL-адрас</label>
                            <input type="url" class="form_input" id="linkUrl" placeholder="https://...">
                        </div>
                    </div>

                    <!-- БЛОК: ВЫЯВА -->
                    <div id="imageBlock" class="material-block" style="display: none;">
                        <div class="form_field">
                            <label class="form_label">Выява</label>
                            <input type="file" class="form_input" id="imageFile" accept="image/*">
                        </div>
                        <div id="imagePreviewContainer" class="image-preview" style="display: none;">
                            <img id="imagePreview" src="" alt="Перадпрагляд">
                        </div>
                    </div>

                    <div id="saveMessage" style="text-align: center; margin-top: 10px;"></div>

                    <div class="form_actions">
                        <button class="save_btn" id="saveCeMaterialBtn">💾 Захаваць матэрыял</button>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script src="js/api.js"></script>
    <script>
      if (!API.isAuthenticated()) {
        window.location.href = 'authorization.html';
      }
      if (!API.isTeacher()) {
        alert('У вас няма доступу да гэтай старонкі');
        window.location.href = 'section.html';
      }

      const urlParams = new URLSearchParams(window.location.search);
      const presetType = urlParams.get('type') || 'test';
      const editId = urlParams.get('edit');

      const typeSelect = document.getElementById('ceMaterialType');
      const testBlock = document.getElementById('testBlock');
      const linkBlock = document.getElementById('linkBlock');
      const imageBlock = document.getElementById('imageBlock');
      const saveMessage = document.getElementById('saveMessage');
      let imageBase64 = null;
      let questionCounter = 0;

      if (presetType === 'link') typeSelect.value = 'link';
      else if (presetType === 'image') typeSelect.value = 'image';
      else typeSelect.value = 'test';

      function toggleBlocks() {
        const type = typeSelect.value;
        testBlock.style.display = type === 'test' ? 'block' : 'none';
        linkBlock.style.display = type === 'link' ? 'block' : 'none';
        imageBlock.style.display = type === 'image' ? 'block' : 'none';
      }

      typeSelect.addEventListener('change', toggleBlocks);
      toggleBlocks();

      document.getElementById('backBtn').addEventListener('click', () => {
        window.location.href = 'ca.html';
      });

      if (editId) {
        document.getElementById('pageTitle').textContent = 'Рэдагаваць матэрыял';
        loadMaterialData(editId);
      }

      async function loadMaterialData(id) {
        try {
          const result = await API.getCEMaterials();
          if (result.success && result.data.materials) {
            const material = result.data.materials.find(m => m.id == id);
            if (material) {
              document.getElementById('ceMaterialName').value = material.title;
              typeSelect.value = material.material_type;
              toggleBlocks();
              if (material.material_type === 'link') {
                document.getElementById('linkUrl').value = material.content_url || '';
              } else if (material.material_type === 'image') {
                imageBase64 = material.image_data;
                document.getElementById('imagePreview').src = material.image_data || '';
                document.getElementById('imagePreviewContainer').style.display = 'block';
              }
            }
          }
        } catch (e) {
          console.error('Памылка загрузкі:', e);
        }
      }

      // ========== ФУНКЦИИ ДЛЯ ТЕСТОВ ==========
      function addQuestion(questionData = null) {
        questionCounter++;
        const container = document.getElementById('questionsContainer');
        const questionId = Date.now() + Math.random();
        const questionDiv = document.createElement('div');
        questionDiv.className = 'question_card';
        questionDiv.dataset.id = questionId;
        questionDiv.innerHTML = `
          <div class="question_header">
            <span class="question_title">Пытанне ${questionCounter}</span>
            <button class="remove_question_btn" onclick="this.closest('.question_card').remove(); updateNumbers();">✖</button>
          </div>
          <input type="text" class="question_text" placeholder="Тэкст пытання" value="${questionData ? questionData.text : ''}">
          <div class="question_type">
            <label><input type="radio" name="type_${questionId}" value="single" class="type_radio" ${!questionData || questionData.type === 'single' ? 'checked' : ''} onchange="toggleAnswersContainer(this)"> Адзінарны выбар</label>
            <label><input type="radio" name="type_${questionId}" value="multiple" class="type_radio" ${questionData && questionData.type === 'multiple' ? 'checked' : ''} onchange="toggleAnswersContainer(this)"> Множны выбар</label>
            <label><input type="radio" name="type_${questionId}" value="text" class="type_radio" ${questionData && questionData.type === 'text' ? 'checked' : ''} onchange="toggleAnswersContainer(this)"> Увод радка</label>
          </div>
          <div class="answers_container" style="${questionData && questionData.type === 'text' ? 'display:none;' : ''}"></div>
          <div class="text_answer_container" style="${questionData && questionData.type === 'text' ? 'display:block;' : 'display:none;'}">
            <input type="text" class="text_correct_answer" placeholder="Увядзіце правільны адказ" value="${questionData && questionData.correctAnswer ? questionData.correctAnswer : ''}">
            <div class="text-answer-hint">Адказ будзе правярацца без уліку рэгістра</div>
          </div>
          <button class="add_answer_btn" onclick="addAnswer(this)" style="${questionData && questionData.type === 'text' ? 'display:none;' : ''}">+ Дадаць адказ</button>
        `;
        container.appendChild(questionDiv);
        if (questionData && questionData.answers && questionData.type !== 'text') {
          const answersContainer = questionDiv.querySelector('.answers_container');
          questionData.answers.forEach(answer => {
            addAnswerToContainer(answersContainer, answer.text, answer.correct);
          });
        } else if (!questionData) {
          addAnswer(questionDiv.querySelector('.add_answer_btn'));
        }
      }

      function addAnswerToContainer(container, text = '', isCorrect = false) {
        const answerRow = document.createElement('div');
        answerRow.className = 'answer_row';
        answerRow.innerHTML = `
          <input type="text" class="answer_input" placeholder="Варыянт адказу" value="${text}">
          <label><input type="checkbox" class="correct_checkbox" ${isCorrect ? 'checked' : ''}> Правільны</label>
          <button class="remove_answer_btn" onclick="this.parentElement.remove()">✖</button>
        `;
        container.appendChild(answerRow);
      }

      window.addAnswer = function(button) {
        const container = button.closest('.question_card').querySelector('.answers_container');
        addAnswerToContainer(container);
      };

      window.toggleAnswersContainer = function(radio) {
        const card = radio.closest('.question_card');
        const answersContainer = card.querySelector('.answers_container');
        const textAnswerContainer = card.querySelector('.text_answer_container');
        const addAnswerBtn = card.querySelector('.add_answer_btn');
        const isTextType = radio.value === 'text';
        if (isTextType) {
          answersContainer.style.display = 'none';
          textAnswerContainer.style.display = 'block';
          addAnswerBtn.style.display = 'none';
        } else {
          answersContainer.style.display = 'block';
          textAnswerContainer.style.display = 'none';
          addAnswerBtn.style.display = 'inline-block';
          if (answersContainer.children.length === 0) addAnswer(addAnswerBtn);
        }
      };

      window.updateNumbers = function() {
        const questions = document.querySelectorAll('.question_card');
        questions.forEach((q, i) => {
          q.querySelector('.question_title').textContent = `Пытанне ${i + 1}`;
        });
        questionCounter = questions.length;
      };

      document.getElementById('addQuestionBtn')?.addEventListener('click', () => addQuestion());

      document.getElementById('imageFile').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (file) {
          const reader = new FileReader();
          reader.onload = function(ev) {
            document.getElementById('imagePreview').src = ev.target.result;
            document.getElementById('imagePreviewContainer').style.display = 'block';
            imageBase64 = ev.target.result;
          };
          reader.readAsDataURL(file);
        }
      });

      // Сохранение
      document.getElementById('saveCeMaterialBtn').addEventListener('click', async () => {
        const materialType = typeSelect.value;
        const title = document.getElementById('ceMaterialName').value.trim();

        if (!title) {
          saveMessage.style.color = 'red';
          saveMessage.textContent = 'Увядзіце назву матэрыяла';
          return;
        }

        saveMessage.style.color = 'blue';
        saveMessage.textContent = 'Захаванне...';

        const data = { title, material_type: materialType };

        if (materialType === 'test') {
          const questions = [];
          let hasQuestions = false;

          document.querySelectorAll('.question_card').forEach(card => {
            const questionText = card.querySelector('.question_text').value.trim();
            const questionType = card.querySelector('input[type="radio"]:checked').value;
            if (!questionText) return;

            const qData = { text: questionText, type: questionType, answers: [], correctAnswer: null };

            if (questionType === 'text') {
              qData.correctAnswer = card.querySelector('.text_correct_answer').value.trim();
              if (!qData.correctAnswer) return;
            } else {
              card.querySelectorAll('.answer_row').forEach(row => {
                const answerText = row.querySelector('.answer_input').value.trim();
                if (!answerText) return;
                qData.answers.push({
                  text: answerText,
                  correct: row.querySelector('.correct_checkbox').checked
                });
              });
              if (qData.answers.length === 0) return;
            }
            questions.push(qData);
            hasQuestions = true;
          });

          if (!hasQuestions) {
            saveMessage.style.color = 'red';
            saveMessage.textContent = 'Дадайце хаця б адно пытанне';
            return;
          }

          const testTime = parseInt(document.getElementById('testTime').value) || 20;

          try {
            // ✅ Создаём тест с class_id = 0 (только для ЦЭ)
            const testResult = await API.createTest(title, null, testTime);
            if (testResult.success) {
              const savedTestId = testResult.data.id;
              await API.saveTestQuestions(savedTestId, questions);
              data.test_id = savedTestId;
            } else {
              saveMessage.style.color = 'red';
              saveMessage.textContent = 'Памылка стварэння тэста';
              return;
            }
          } catch (e) {
            saveMessage.style.color = 'red';
            saveMessage.textContent = 'Памылка злучэння';
            return;
          }
        } else if (materialType === 'link') {
          const url = document.getElementById('linkUrl').value.trim();
          if (!url) {
            saveMessage.style.color = 'red';
            saveMessage.textContent = 'Увядзіце URL';
            return;
          }
          data.content_url = url;
        } else if (materialType === 'image') {
          if (!imageBase64) {
            saveMessage.style.color = 'red';
            saveMessage.textContent = 'Выберыце выяву';
            return;
          }
          data.image_data = imageBase64;
        }

        try {
          let result;
          if (editId) {
            data.id = editId;
            result = await API.updateCEMaterial(data);
          } else {
            result = await API.createCEMaterial(data);
          }

          if (result.success) {
            saveMessage.style.color = 'green';
            saveMessage.textContent = 'Матэрыял захаваны!';
            setTimeout(() => {
              window.location.href = 'ca.html';
            }, 1000);
          } else {
            saveMessage.style.color = 'red';
            saveMessage.textContent = 'Памылка: ' + (result.message || '');
          }
        } catch (e) {
          saveMessage.style.color = 'red';
          saveMessage.textContent = 'Памылка злучэння';
        }
      });

      if (presetType === 'test' && !editId) {
        addQuestion();
      }
    </script>
</body>
</html>
