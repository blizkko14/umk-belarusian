<!doctype html>
<html lang="be">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Тэсты</title>
    <link rel="stylesheet" href="css/null.css" />
    <link rel="stylesheet" href="css/fonts.css" />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <main>
      <section class="topics">
        <div class="container">
          <div class="topics_header">
            <button class="back_btn" id="backBtn">
              <img src="./img/Arrow_back.svg" alt="Назад" class="back-arrow" />
            </button>
            <div class="block_title">
              <h1 class="topics_title" id="classTitle">5 клас</h1>
            </div>
            <button class="add-topic-btn" id="addTestBtn" style="display: flex">
              <img src="./img/plus.svg" alt="Дадаць" class="plus-icon" />
            </button>
          </div>

          <div class="topics_list" id="testsList">
            <!-- Тэсты загружаюцца праз API -->
          </div>
        </div>
      </section>
    </main>

    <!-- ТОЛЬКИ модальное окно подтверждения удаления -->
    <div id="deleteModal" class="modal" style="display: none">
      <div class="modal-content">
        <h3>⚠️ Пацверджанне выдалення</h3>
        <p>Вы сапраўды хочаце выдаліць тэст <strong id="deleteTestName"></strong>?</p>
        <p class="warning-text">Увага! Усе пытанні гэтага тэста будуць выдалены.</p>
        <div class="modal-buttons">
         <button class="modal-btn confirm" id="confirmDeleteBtn" 
        style="font-family: 'Montserrat Alternates', sans-serif; font-size: 18px; font-weight: 500;">
    Выдаліць
</button>
<button class="modal-btn cancel" id="cancelDeleteBtn"
        style="font-family: 'Montserrat Alternates', sans-serif; font-size: 18px; font-weight: 500;">
    Адмяніць
</button>
        </div>
      </div>
    </div>

    <script src="js/api.js"></script>
    <script>
      if (!API.isAuthenticated()) {
        window.location.href = "authorization.html";
      }

      const urlParams = new URLSearchParams(window.location.search);
      const classNumber = urlParams.get("class") || "5";
      const isTeacher = API.isTeacher();

      document.getElementById("classTitle").textContent = `${classNumber} клас`;
      if (!isTeacher) {
        document.getElementById("addTestBtn").style.display = "none";
      }

      document.getElementById("backBtn").addEventListener("click", () => {
        window.location.href = `classes.html?type=tests`;
      });

      // Кнопка "+" адразу вядзе на старонку стварэння тэста
      document.getElementById("addTestBtn").addEventListener("click", () => {
        window.location.href = `forma_tests.html?class=${classNumber}`;
      });

      // Загрузка тэстаў
      async function loadTests() {
        const testsList = document.getElementById("testsList");
        testsList.innerHTML = '<p class="empty-message">Загрузка...</p>';

        try {
          const result = await API.getTests(classNumber);
          
          if (result.success && result.data.tests) {
            const tests = result.data.tests;

            if (tests.length === 0) {
              testsList.innerHTML = '<p class="empty-message">Няма тэстаў.</p>';
              return;
            }

            testsList.innerHTML = "";

            tests.forEach(test => {
              const wrapper = document.createElement("div");
              wrapper.className = "topic_block_wrapper2";
              wrapper.innerHTML = `
                <div class="topic_block2" >
                  ${test.title}
                  <button class="start_test2" data-test-id="${test.id}">
                    Пачаць тэст
                    <img src="./img/Arrow_teast.svg" alt="" class="arrow_test2" />
                  </button>
                </div>
                ${isTeacher ? `
                  <div class="topic_actions">
                    <button class="topic_icon edit" data-id="${test.id}">✏️</button>
                    <button class="topic_icon delete" data-id="${test.id}" data-title="${test.title}">🗑️</button>
                  </div>
                ` : ""}
              `;
              testsList.appendChild(wrapper);
            });

            attachEventHandlers();
          } else {
            testsList.innerHTML = '<p class="empty-message">Памылка загрузкі</p>';
          }
        } catch (error) {
          testsList.innerHTML = '<p class="empty-message">Памылка злучэння</p>';
        }
      }

      function attachEventHandlers() {
        document.querySelectorAll(".start_test2").forEach(btn => {
          btn.addEventListener("click", function () {
            const id = this.dataset.testId;
            window.location.href = `test_student.html?id=${id}&class=${classNumber}`;
          });
        });

        document.querySelectorAll(".edit").forEach(btn => {
          btn.addEventListener("click", function () {
            const id = this.dataset.id;
            window.location.href = `forma_tests.html?class=${classNumber}&test_id=${id}`;
          });
        });

        const deleteModal = document.getElementById("deleteModal");
        const deleteTestName = document.getElementById("deleteTestName");
        let currentDeleteId = null;

        document.querySelectorAll(".delete").forEach(btn => {
          btn.addEventListener("click", function () {
            currentDeleteId = this.dataset.id;
            deleteTestName.textContent = this.dataset.title;
            deleteModal.style.display = "flex";
          });
        });

        document.getElementById("confirmDeleteBtn").onclick = async () => {
          if (currentDeleteId) {
            const result = await API.deleteTest(currentDeleteId);
            if (result.success) {
              deleteModal.style.display = "none";
              loadTests();
            } else {
              alert("Памылка выдалення");
            }
          }
        };

        document.getElementById("cancelDeleteBtn").onclick = () => {
          deleteModal.style.display = "none";
        };
      }

      window.addEventListener("click", (e) => {
        const deleteModal = document.getElementById("deleteModal");
        if (e.target === deleteModal) deleteModal.style.display = "none";
      });

      loadTests();
    </script>
  </body>
</html>
