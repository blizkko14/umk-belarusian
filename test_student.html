<!doctype html>
<html lang="be">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Праходжанне тэста</title>
    <link rel="stylesheet" href="css/null.css" />
    <link rel="stylesheet" href="css/fonts.css" />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <main>
      <section class="test-student">
        <div class="container">
          <div class="test-header">
            <button class="back_btn" id="backBtn">
              <img src="./img/Arrow_back.svg" alt="Назад" class="back-arrow" />
            </button>
            <div class="test-info-header">
              <h1 class="test-title-header" id="testTitle">Загрузка...</h1>
              <div class="test-meta-header">
                <span id="questionsCount">📊 0 пытанняў</span>
                <span>⏱️ <span id="timerDisplay">00:00</span></span>
              </div>
            </div>
            <div class="placeholder_header"></div>
          </div>

          <div class="test-progress">
            <div class="progress-bar">
              <div class="progress-fill" id="progressFill" style="width: 0%"></div>
            </div>
            <div class="progress-text" id="progressText">Пытанне 1 з 0</div>
          </div>

          <div id="questionsContainer"></div>

          <div class="test-navigation">
            <button class="nav-btn prev-btn" id="prevBtn" disabled>← Папярэдняе</button>
            <button class="nav-btn next-btn" id="nextBtn">Наступнае →</button>
          </div>

          <div class="test-submit">
            <button class="submit-btn" id="submitBtn">📝 Завяршыць тэст</button>
          </div>
        </div>
      </section>
    </main>

    <script src="js/api.js"></script>
    <script>
      if (!API.isAuthenticated()) {
        window.location.href = "authorization.html";
      }

      const urlParams = new URLSearchParams(window.location.search);
      const testId = urlParams.get("id");
      const classNumber = urlParams.get("class") || "5";
      const conspectId = urlParams.get("conspect_id") || null;

      if (!testId) {
        window.location.href = `tests.html?class=${classNumber}`;
      }

      let questions = [];
      let currentQuestion = 0;
      let timerInterval = null;
      let totalSeconds = 0;
      let startTime = null;
      let testStarted = false;

      // Определяем, откуда пришёл пользователь
      const cameFromCE = document.referrer.includes("ca.html");
      const cameFromConspect = conspectId !== null;

      document.getElementById("backBtn").addEventListener("click", () => {
        if (testStarted) {
          if (confirm("Вы ўпэўнены, што хочаце выйсці? Прагрэс будзе страчаны.")) {
            clearInterval(timerInterval);
            goBackToSource();
          }
        } else {
          goBackToSource();
        }
      });

      function goBackToSource() {
        if (cameFromConspect) {
          window.location.href = `teory.html?id=${conspectId}&class=${classNumber}`;
        } else if (cameFromCE) {
          window.location.href = "ca.html";
        } else {
          window.location.href = `tests.html?class=${classNumber}`;
        }
      }

      function startTimer(minutes) {
        totalSeconds = minutes * 60;
        startTime = Date.now();
        updateTimerDisplay();
        timerInterval = setInterval(() => {
          totalSeconds--;
          updateTimerDisplay();
          if (totalSeconds <= 0) {
            clearInterval(timerInterval);
            alert("Час выйшаў! Тэст будзе завершаны.");
            finishTest();
          }
        }, 1000);
      }

      function updateTimerDisplay() {
        const mins = Math.floor(totalSeconds / 60);
        const secs = totalSeconds % 60;
        document.getElementById("timerDisplay").textContent =
          `${String(mins).padStart(2, "0")}:${String(secs).padStart(2, "0")}`;
      }

      async function loadTest() {
        try {
          const result = await API.getTestQuestions(testId);
          if (result.success) {
            questions = result.data.questions;
            const testTime = result.data.test.time_limit || 20;
            document.getElementById("testTitle").textContent = result.data.test.title;
            document.getElementById("questionsCount").textContent = `📊 ${questions.length} пытанняў`;
            renderAllQuestions();
            showQuestion(0);
            startTimer(testTime);
            testStarted = true;
          } else {
            alert("Памылка загрузкі тэста");
            goBackToSource();
          }
        } catch (error) {
          console.error("Памылка:", error);
          alert("Памылка загрузкі тэста");
        }
      }

      function renderAllQuestions() {
        const container = document.getElementById("questionsContainer");
        container.innerHTML = "";
        questions.forEach((q, index) => {
          const card = document.createElement("div");
          card.className = `question-card ${index === 0 ? "active" : ""}`;
          card.id = `question${index}`;
          let answersHTML = "";
          if (q.question_type === "text") {
            answersHTML = `<div class="text-answer"><input type="text" class="text-input" placeholder="Увядзіце адказ" data-question="${index}"></div>`;
          } else {
            const inputType = q.question_type === "single" ? "radio" : "checkbox";
            answersHTML = '<div class="answers-list">';
            q.answers.forEach((a, aIndex) => {
              answersHTML += `<label class="answer-option"><input type="${inputType}" name="q${index}" value="${aIndex}" data-question="${index}">${a.answer_text}</label>`;
            });
            answersHTML += "</div>";
          }
          card.innerHTML = `<div class="question-text">${index + 1}. ${q.question_text}</div>${answersHTML}`;
          container.appendChild(card);
        });
      }

      function showQuestion(index) {
        document.querySelectorAll(".question-card").forEach((card, i) => {
          card.classList.toggle("active", i === index);
        });
        document.getElementById("prevBtn").disabled = index === 0;
        document.getElementById("nextBtn").disabled = index === questions.length - 1;
        document.getElementById("progressFill").style.width = `${((index + 1) / questions.length) * 100}%`;
        document.getElementById("progressText").textContent = `Пытанне ${index + 1} з ${questions.length}`;
        currentQuestion = index;
      }

      document.getElementById("prevBtn").addEventListener("click", () => {
        if (currentQuestion > 0) showQuestion(currentQuestion - 1);
      });

      document.getElementById("nextBtn").addEventListener("click", () => {
        if (currentQuestion < questions.length - 1) showQuestion(currentQuestion + 1);
      });

      document.getElementById("submitBtn").addEventListener("click", () => {
        finishTest();
      });

      function finishTest() {
        clearInterval(timerInterval);
        let score = 0;
        let details = [];

        questions.forEach((q, index) => {
          let isCorrect = false;
          let userAnswer = "";

          if (q.question_type === "text") {
            const input = document.querySelector(`.text-input[data-question="${index}"]`);
            userAnswer = input ? input.value.trim() : "(не ўведзена)";
            if (input && input.value.trim().toLowerCase() === q.correct_text_answer.trim().toLowerCase()) {
              score++;
              isCorrect = true;
            }
          } else {
            const checked = document.querySelectorAll(`input[name="q${index}"]:checked`);
            const correctAnswers = q.answers.filter((a) => a.is_correct == 1);
            const selectedTexts = [];
            checked.forEach((c) => {
              selectedTexts.push(q.answers[parseInt(c.value)].answer_text);
            });
            userAnswer = selectedTexts.join(", ") || "(не выбрана)";
            if (checked.length === correctAnswers.length) {
              let allCorrect = true;
              checked.forEach((c) => {
                if (!correctAnswers.some((a) => a.answer_text === q.answers[parseInt(c.value)].answer_text)) {
                  allCorrect = false;
                }
              });
              if (allCorrect) { score++; isCorrect = true; }
            }
          }

          details.push({ number: index + 1, correct: isCorrect, userAnswer: userAnswer });
        });

        const percent = Math.round((score / questions.length) * 100);
        let grade = "", gradeColor = "";

        if (percent >= 90) { grade = "🏆 Выдатна!"; gradeColor = "#2e7d32"; }
        else if (percent >= 70) { grade = "✅ Добра!"; gradeColor = "#4caf50"; }
        else if (percent >= 50) { grade = "⚠️ Здавальняюча"; gradeColor = "#ff9800"; }
        else { grade = "❌ Трэба падрыхтавацца"; gradeColor = "#f44336"; }

        showResultModal(score, questions.length, percent, grade, gradeColor, details);
      }

      function showResultModal(score, total, percent, grade, gradeColor, details) {
        const modal = document.createElement("div");
        modal.className = "modal";
        modal.style.display = "flex";

        const elapsedSeconds = startTime ? Math.floor((Date.now() - startTime) / 1000) : 0;
        const spentMins = Math.floor(elapsedSeconds / 60);
        const spentSecs = elapsedSeconds % 60;
        const timeSpent = totalSeconds <= 0 ? "Час выйшаў" : `Затрачана: ${spentMins} хв ${spentSecs} с`;

        // Определяем текст кнопки возврата
        let backButtonText = '🔙 Да спіса';
        if (cameFromConspect) {
          backButtonText = '📖 Да канспекта';
        } else if (cameFromCE) {
          backButtonText = '🎓 Да ЦЭ';
        }

        let detailsHTML = details.map((d) => `
          <div style="padding: 10px; margin-bottom: 5px; border-radius: 8px; 
                      ${d.correct ? "background: #e8f5e9;" : "background: #ffebee;"}">
            <strong>Пытанне ${d.number}:</strong> 
            ${d.correct ? "✅" : "❌"}
            ${!d.correct ? `<br><small>Ваш адказ: ${d.userAnswer}</small>` : ""}
          </div>
        `).join("");

        modal.innerHTML = `
          <div class="modal-content" style="max-width: 500px; padding: 25px; text-align: center;">
            <h3 style="font-family: 'Cormorant SC', serif; font-size: 28px; color: #5f2d1e; margin-bottom: 10px;">🏆 Вынік</h3>
            <div style="font-family: 'Cormorant SC', serif; font-size: 56px; font-weight: 700; color: #5f2d1e;">${score} / ${total}</div>
            <div style="font-size: 20px; margin: 5px 0 10px; color: #5f2d1e;">${percent}%</div>
            <div style="font-size: 18px; font-weight: 600; color: ${gradeColor}; margin-bottom: 5px;
                        padding: 6px 16px; border-radius: 20px; display: inline-block;
                        background: ${gradeColor === "#2e7d32" ? "#e8f5e9" : gradeColor === "#4caf50" ? "#e8f5e9" : gradeColor === "#ff9800" ? "#fff3e0" : "#ffebee"};">
              ${grade}
            </div>
            <div style="font-size: 14px; color: #666; margin-bottom: 15px;">${timeSpent}</div>
            <div style="max-height: 200px; overflow-y: auto; text-align: left; margin: 10px 0;">${detailsHTML}</div>
            <div style="display: flex; gap: 10px; justify-content: center;">
              <button id="closeResultBtn" style="padding: 8px 20px; border-radius: 50px; cursor: pointer; 
                      font-family: 'Cormorant SC', serif; font-size: 16px; background: #E6EBF5; color: #5f2d1e; border: 2px solid #5f2d1e;">
                ${backButtonText}
              </button>
              <button id="retryBtn" style="padding: 8px 20px; border-radius: 50px; cursor: pointer; 
                      font-family: 'Cormorant SC', serif; font-size: 16px; background: #5f2d1e; color: #f0f7ff; border: 2px solid #5f2d1e;">
                🔄 Прайсці зноў
              </button>
            </div>
          </div>
        `;

        document.body.appendChild(modal);

        document.getElementById("closeResultBtn").addEventListener("click", () => {
          modal.remove();
          goBackToSource();
        });

        document.getElementById("retryBtn").addEventListener("click", () => {
          modal.remove();
          location.reload();
        });

        modal.addEventListener("click", (e) => {
          if (e.target === modal) {
            modal.remove();
            goBackToSource();
          }
        });
      }

      loadTest();
    </script>
  </body>
</html>
