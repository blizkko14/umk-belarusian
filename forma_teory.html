<!doctype html>
<html lang="be">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Стварыць канспект</title>
    <link rel="stylesheet" href="css/null.css" />
    <link rel="stylesheet" href="css/fonts.css" />
    <link rel="stylesheet" href="css/style.css" />

    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet" />
    <script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
  </head>
  <body>
    <main>
      <section class="forma_teory">
        <div class="container">
          <div class="forma_teory_header">
            <button class="back_btn" id="backBtn">
              <img src="./img/Arrow_back.svg" alt="Назад" class="back-arrow" />
            </button>
            <div class="block_title">
              <h1 class="topics_title" id="pageTitle">Стварыць новы канспект</h1>
            </div>
            <div class="placeholder_btn"></div>
          </div>

          <div class="forma_teory_wrapper">
            <div class="title_teory">
              <h2 class="title_forma_teory">Назва канспекта:</h2>
              <input type="text" id="conspectTitle" class="input_title" placeholder="Увядзіце назву канспекта" />
            </div>

            <input type="hidden" id="classId" value="" />

            <div class="content_zmest">
              <h2 class="title_forma_teory">📝 Змест</h2>
              <div id="conspectContent" style="height: 400px; background: white"></div>
            </div>

            <div class="dop_content_forma">
              <h2 class="title_forma_teory">📎 Дадатковыя матэрыялы</h2>
              <div class="forma_dop_material">
                <input type="file" id="fileInput" style="display: none" multiple accept=".jpg,.jpeg,.png,.gif,.pdf,.doc,.docx,.ppt,.pptx,.xls,.xlsx" />
                <button class="add_fail" type="button" id="addFileBtn">
                  <img src="./img/plus_file.svg" alt="" class="plus_file" />
                  Дадаць файл
                </button>
                <button class="add_link" type="button" id="addLinkBtn">
                  <img src="./img/plus_file.svg" alt="" class="plus_file" />
                  Дадаць спасылку
                </button>
                <div id="attachmentsList" style="width: 100%; margin-top: 15px"></div>
              </div>
            </div>

            <!-- Прывязка да тэста -->
            <div class="form-group test-link-group" style="margin-top: 25px;">
              <label style="font-family: 'Montserrat Alternates', sans-serif; font-size: 22px; font-weight: 500; color: #5f2d1e; display: block; margin-bottom: 10px;">
                🔗 Прывязка да тэста:
              </label>
              <div class="test-link-wrapper" style="display: flex; gap: 15px; align-items: center; flex-wrap: wrap;">
                <select id="testSelect" class="form-select" style="flex: 1; padding: 12px 20px; border: 3px solid #5f2d1e; border-radius: 50px; background: #f9fdff; font-family: 'Montserrat Alternates', sans-serif;">
                  <option value="">-- Не выбрана --</option>
                </select>
                <button id="refreshTestsBtn" style="padding: 10px 15px; border: 2px solid #5f2d1e; border-radius: 50px; cursor: pointer; background: #E6EBF5; font-family: 'Cormorant SC', serif;">
                  🔄 Абнавіць
                </button>
              </div>
              <small style="font-family: 'Montserrat Alternates', sans-serif; font-size: 13px; color: #3e1509; opacity: 0.7; margin-top: 8px; display: block;">
                💡 Калі вы прывяжаце тэст, на старонцы канспекта з'явіцца кнопка "Прайсці тэст"
              </small>
            </div>

            <div class="save_btn_wrapper">
              <button class="save_conspect_btn" id="saveConspectBtn">💾 Захаваць канспект</button>
            </div>
            <div id="saveMessage" style="text-align: center; margin-top: 10px"></div>
          </div>
        </div>
      </section>
    </main>

    <div id="linkModal" class="modal" style="display: none">
      <div class="modal-content">
        <h3>🔗 Дадаць спасылку</h3>
        <input type="text" id="linkUrl" class="modal-input" placeholder="URL-адрас (https://...)" />
        <input type="text" id="linkTitle" class="modal-input" placeholder="Назва спасылкі" />
        <div class="modal-buttons">
          <button class="modal-btn save-modal" id="saveLinkBtn">Дадаць</button>
          <button class="modal-btn cancel-modal" id="cancelLinkBtn">Адмяніць</button>
        </div>
      </div>
    </div>

    <script src="js/router.js"></script>
    <script src="js/api.js"></script>
    <script>
      if (!API.isAuthenticated()) {
        window.location.href = "authorization.html";
      }
      if (!API.isTeacher()) {
        alert("У вас няма доступу да гэтай старонкі");
        window.location.href = "section.html";
      }

      let quill = null;
      const urlParams = new URLSearchParams(window.location.search);
      const classFromUrl = urlParams.get("class") || "5";
      const conspectId = urlParams.get("conspect_id");
      let attachments = { files: [], links: [] };
      let selectedTestId = null; // Захоўваем выбраны тэст

      const backBtn = document.getElementById("backBtn");
      const conspectTitle = document.getElementById("conspectTitle");
      const saveBtn = document.getElementById("saveConspectBtn");
      const saveMessage = document.getElementById("saveMessage");
      const pageTitle = document.getElementById("pageTitle");
      const fileInput = document.getElementById("fileInput");
      const addFileBtn = document.getElementById("addFileBtn");
      const addLinkBtn = document.getElementById("addLinkBtn");
      const attachmentsList = document.getElementById("attachmentsList");
      const classIdInput = document.getElementById("classId");
      const testSelect = document.getElementById("testSelect");
      const refreshTestsBtn = document.getElementById("refreshTestsBtn");
      classIdInput.value = classFromUrl;

      const linkModal = document.getElementById("linkModal");
      const linkUrl = document.getElementById("linkUrl");
      const linkTitle = document.getElementById("linkTitle");
      const saveLinkBtn = document.getElementById("saveLinkBtn");
      const cancelLinkBtn = document.getElementById("cancelLinkBtn");

      backBtn.addEventListener("click", () => {
        window.location.href = `topics_teory.html?class=${classFromUrl}`;
      });

      // Загрузка спіса тэстаў для гэтага класа
      async function loadTests() {
        try {
          const result = await API.getTests(classFromUrl);
          if (result.success && result.data.tests) {
            testSelect.innerHTML = '<option value="">-- Не выбрана --</option>';
            result.data.tests.forEach(test => {
              const option = document.createElement("option");
              option.value = test.id;
              option.textContent = test.title;
              testSelect.appendChild(option);
            });
          }
        } catch (error) {
          console.error("Памылка загрузкі тэстаў:", error);
        }
      }

      loadTests();
      
      refreshTestsBtn.addEventListener("click", () => {
        testSelect.innerHTML = '<option value="">Загрузка...</option>';
        loadTests();
      });

      testSelect.addEventListener("change", () => {
        selectedTestId = testSelect.value || null;
      });

      function getFileIcon(type) {
        if (!type) return "📄";
        if (type.includes("word") || type.includes("document")) return "📝";
        if (type.includes("powerpoint") || type.includes("presentation")) return "📊";
        if (type.includes("excel") || type.includes("spreadsheet")) return "📈";
        if (type.includes("pdf")) return "📕";
        if (type.includes("image")) return "🖼️";
        return "📄";
      }

      // ========== QUILL ==========
      quill = new Quill("#conspectContent", {
        theme: "snow",
        placeholder: "Увядзіце тэкст канспекта...",
        modules: {
          toolbar: [
            [{ header: [1, 2, 3, false] }],
            ["bold", "italic", "underline", "strike"],
            [{ color: [] }, { background: [] }],
            [{ align: [] }],
            [{ list: "ordered" }, { list: "bullet" }],
            ["link", "image", "blockquote"],
            ["clean"],
          ],
        },
      });

      // Малюнкі
      quill.getModule("toolbar").addHandler("image", function () {
        const input = document.createElement("input");
        input.setAttribute("type", "file");
        input.setAttribute("accept", "image/*");
        input.click();
        input.onchange = async function () {
          const file = input.files[0];
          if (!file) return;
          saveMessage.style.color = "blue";
          saveMessage.textContent = "Загрузка малюнка...";
          const formData = new FormData();
          formData.append("file", file);
          try {
            const response = await fetch("http://localhost/UMK/api/upload.php", {
              method: "POST",
              body: formData,
            });
            const result = await response.json();
            const url = result.url || (result.data && result.data.url);
            if (url) {
              const range = quill.getSelection(true);
              quill.insertEmbed(range.index, "image", url);
              saveMessage.style.color = "green";
              saveMessage.textContent = "Малюнак загружаны";
            } else {
              saveMessage.style.color = "red";
              saveMessage.textContent = "Памылка загрузкі";
            }
          } catch (error) {
            saveMessage.style.color = "red";
            saveMessage.textContent = "Памылка злучэння";
          }
          setTimeout(() => { saveMessage.textContent = ""; }, 3000);
        };
      });

      if (conspectId) {
        pageTitle.textContent = "Рэдагаваць канспект";
        loadConspectData(conspectId);
      }

      async function loadConspectData(id) {
        try {
          const result = await API.getConspect(id);
          if (result.success && result.data.conspect) {
            const conspect = result.data.conspect;
            conspectTitle.value = conspect.title;
            quill.root.innerHTML = conspect.content;
            classIdInput.value = conspect.class_id || classFromUrl;
            
            // Загружаем прывязаны тэст, калі ёсць
            if (conspect.linked_test_id) {
              selectedTestId = conspect.linked_test_id;
              // Пачакаем загрузкі спіса, потым выберам
              setTimeout(() => {
                testSelect.value = conspect.linked_test_id;
              }, 500);
            }
            
            if (conspect.attachments) {
              try {
                attachments = JSON.parse(conspect.attachments);
                renderAttachments();
              } catch (e) {}
            }
          }
        } catch (error) {
          console.error("Памылка загрузкі:", error);
        }
      }

      addFileBtn.addEventListener("click", () => fileInput.click());
      fileInput.addEventListener("change", async (e) => {
        const files = Array.from(e.target.files);
        for (const file of files) {
          saveMessage.style.color = "blue";
          saveMessage.textContent = `Загрузка файла: ${file.name}...`;
          const formData = new FormData();
          formData.append("file", file);
          try {
            const response = await fetch("http://localhost/UMK/api/upload.php", {
              method: "POST",
              body: formData,
            });
            const result = await response.json();
            if (result.success) {
              attachments.files.push({
                name: result.data.name,
                url: result.data.url,
                type: result.data.type,
                size: result.data.size,
              });
              renderAttachments();
              saveMessage.style.color = "green";
              saveMessage.textContent = `Файл ${file.name} загружаны`;
            } else {
              saveMessage.style.color = "red";
              saveMessage.textContent = `Памылка: ${result.message}`;
            }
          } catch (error) {
            saveMessage.style.color = "red";
            saveMessage.textContent = "Памылка злучэння";
          }
        }
        fileInput.value = "";
        setTimeout(() => { saveMessage.textContent = ""; }, 3000);
      });

      addLinkBtn.addEventListener("click", () => {
        linkUrl.value = "";
        linkTitle.value = "";
        linkModal.style.display = "flex";
      });

      saveLinkBtn.addEventListener("click", () => {
        const url = linkUrl.value.trim();
        const title = linkTitle.value.trim();
        if (!url) { alert("Увядзіце URL-адрас"); return; }
        if (!url.startsWith("http://") && !url.startsWith("https://")) {
          alert("URL павінен пачынацца з http:// або https://");
          return;
        }
        attachments.links.push({ title: title || url, url: url });
        renderAttachments();
        linkModal.style.display = "none";
      });

      cancelLinkBtn.addEventListener("click", () => (linkModal.style.display = "none"));

      function renderAttachments() {
        let html = "";
        if (attachments.files.length > 0) {
          html += '<div style="font-weight: bold; margin-bottom: 5px;">📁 Файлы:</div>';
          attachments.files.forEach((file, index) => {
            html += `
              <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 5px; padding: 5px; background: #e8f0fe; border-radius: 8px;">
                <span>${getFileIcon(file.type)} ${file.name}</span>
                <a href="${file.url}" target="_blank" style="margin-left: auto;">Адкрыць</a>
                <button onclick="removeFile(${index})" style="background: none; border: none; cursor: pointer; color: red;">✖</button>
              </div>`;
          });
        }
        if (attachments.links.length > 0) {
          html += '<div style="font-weight: bold; margin-top: 10px; margin-bottom: 5px;">🔗 Спасылкі:</div>';
          attachments.links.forEach((link, index) => {
            html += `
              <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 5px; padding: 5px; background: #e8f0fe; border-radius: 8px;">
                <span>🔗 ${link.title}</span>
                <a href="${link.url}" target="_blank" style="margin-left: auto;">Адкрыць</a>
                <button onclick="removeLink(${index})" style="background: none; border: none; cursor: pointer; color: red;">✖</button>
              </div>`;
          });
        }
        attachmentsList.innerHTML = html || '<p style="opacity: 0.7;">Няма дададзеных матэрыялаў</p>';
      }

      window.removeFile = function (index) {
        attachments.files.splice(index, 1);
        renderAttachments();
      };
      window.removeLink = function (index) {
        attachments.links.splice(index, 1);
        renderAttachments();
      };

      // ========== ЗАХАВАННЕ ==========
      saveBtn.addEventListener("click", async () => {
        const title = conspectTitle.value.trim();
        const classId = classIdInput.value;
        const content = quill ? quill.root.innerHTML : "";

        if (!title) {
          saveMessage.style.color = "red";
          saveMessage.textContent = "Увядзіце назву канспекта";
          return;
        }

        const hasContent = content && content !== "<p><br></p>" && content !== "";
        const hasFiles = attachments.files.length > 0;
        const hasLinks = attachments.links.length > 0;

        if (!hasContent && !hasFiles && !hasLinks) {
          saveMessage.style.color = "red";
          saveMessage.textContent = "Дадайце тэкст, файлы ці спасылкі";
          return;
        }

        saveMessage.style.color = "blue";
        saveMessage.textContent = "Захаванне...";
        saveBtn.disabled = true;

        try {
          let result;
          const conspectData = {
            title: title,
            content: content,
            class_id: classId,
            attachments: JSON.stringify(attachments),
            linked_test_id: selectedTestId || null  // Захоўваем прывязаны тэст
          };

          if (conspectId) {
            conspectData.id = conspectId;
            result = await API.updateConspect(conspectData);
          } else {
            result = await API.createConspect(conspectData);
          }

          if (result.success) {
            saveMessage.style.color = "green";
            saveMessage.textContent = conspectId ? "Канспект абноўлены!" : "Канспект створаны!";
            setTimeout(() => {
              window.location.href = `topics_teory.html?class=${classId}`;
            }, 1000);
          } else {
            saveMessage.style.color = "red";
            saveMessage.textContent = "Памылка: " + (result.message || "невядомая");
            saveBtn.disabled = false;
          }
        } catch (error) {
          saveMessage.style.color = "red";
          saveMessage.textContent = "Памылка злучэння";
          saveBtn.disabled = false;
        }
      });

      linkModal.addEventListener("click", (e) => {
        if (e.target === linkModal) linkModal.style.display = "none";
      });
    </script>
  </body>
</html>
